<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF CLUB 86 - Official Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px); 
            z-index: -1;
            transform: scale(1.1); 
        }

        .container {
            text-align: center;
            max-width: 400px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 100%;
            max-width: 300px; 
            height: auto;
            margin-bottom: 25px; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .rating-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .rating-stars {
            color: #ffcc00;
            margin-right: 5px;
        }

        .trust-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 340px;
            gap: 8px;
            margin-bottom: 25px;
        }
        .trust-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 2px;
            color: #fff;
            font-size: 11px;
            font-weight: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .trust-icon {
            font-size: 18px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-bottom: 30px;
        }

        .btn-img {
            width: 100%;
            max-width: 240px; 
            height: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-img:hover {
            transform: translateY(-3px) scale(1.03);
            filter: brightness(1.1);
        }

        .slider-wrapper {
            width: 100%;
            max-width: 340px; 
            position: relative;
            overflow: hidden;
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 30px; 
        }
        .slider {
            display: flex;
            width: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .slider img {
            width: 100%;
            height: auto;
            display: block;
            flex-shrink: 0;
        }

        .order-panel {
            width: 100%;
            max-width: 360px; 
            background: rgba(24, 24, 28, 0.95); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 18px 14px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            color: #fff;
            text-align: left;
        }

        .order-header-wrapper {
            text-align: center;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .order-header {
            font-size: 17px;
            font-weight: 600;
            color: #ffcc00; 
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .live-clock {
            font-size: 12px;
            color: #8a8a93;
        }

        .order-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 420px;
            overflow: hidden; 
        }

        .order-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 14px;
            border-radius: 14px;
            border-left: 3px solid #2ea34a; 
            animation: fadeInDown 0.4s ease-out; 
            gap: 10px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .item-icon {
            width: 36px;
            height: 36px;
            background: rgba(46, 163, 74, 0.15);
            border: 1px solid rgba(46, 163, 74, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .item-user {
            font-size: 13px;
            font-weight: 400;
            color: #f4f4f5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-time {
            font-size: 11px;
            color: #71717a;
            margin-top: 3px;
        }

        .item-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            flex-shrink: 0;
            width: 110px; 
        }

        .item-amount {
            font-size: 15px;
            font-weight: 600;
            color: #2ea34a; 
            margin-bottom: 2px;
        }

        .item-status {
            font-size: 11px;
            color: #2ea34a;
            background: rgba(46, 163, 74, 0.15);
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: 400;
            white-space: nowrap; 
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <div class="rating-box">
            <span class="rating-stars">⭐⭐⭐⭐⭐</span> 4.9/5.0 จากลูกค้าผู้ใช้จริง
        </div>

        <div class="trust-container">
            <div class="trust-card">
                <span class="trust-icon">📦</span>
                <span>จัดส่งฟรีทั่วไทย</span>
            </div>
            <div class="trust-card">
                <span class="trust-icon">🛡️</span>
                <span>เก็บเงินปลายทาง</span>
            </div>
            <div class="trust-card">
                <span class="trust-icon">⭐</span>
                <span>รับประกันของแท้</span>
            </div>
        </div>
        
        <div class="btn-container">
            <a href="https://bfclubgame.com/?register=1&key=GOAT" target="_blank">
                <img src="button1.png" alt="สั่งซื้อสินค้า" class="btn-img">
            </a>
            <a href="https://cutt.ly/UtU0uefS" target="_blank">
                <img src="button2.png" alt="ติดต่อสอบถาม" class="btn-img">
            </a>
        </div>

        <div class="slider-wrapper">
            <div class="slider" id="slider">
                <img src="slide1.png" alt="Slide 1">
                <img src="slide2.png" alt="Slide 2">
                <img src="slide3.png" alt="Slide 3">
                <img src="slide4.png" alt="Slide 4">
                <img src="slide5.png" alt="Slide 5">
            </div>
        </div>

        <div class="order-panel">
            <div class="order-header-wrapper">
                <div class="order-header">🛒 รายการสั่งซื้อล่าสุด</div>
                <div class="live-clock" id="liveClock">กำลังโหลดเวลา...</div>
            </div>
            
            <div class="order-list" id="orderList"></div>
        </div>

    </div>

    <script>
        const slider = document.getElementById('slider');
        let index = 0;
        const totalImages = 5; 
        setInterval(() => {
            index++;
            if (index >= totalImages) { index = 0; }
            slider.style.transform = `translateX(${-index * 100}%)`;
        }, 3000); 

        function updateClock() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('th-TH', options);
            const timeStr = now.toLocaleTimeString('th-TH');
            document.getElementById('liveClock').innerHTML = dateStr + " " + timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 🔥 1. อัปเดตชุด Prefixes 200 ตัวตามในรูปภาพของพี่แบบครบถ้วน
        const prefixes = [
            "080", "081", "082", "083", "084", "085", "086", "087", "088", "089",
            "090", "091", "092", "093", "094", "095", "096", "097", "098", "099",
            "061", "062", "063", "064", "065", "081", "085", "092", "095", "063",
            "080", "083", "087", "090", "094", "098", "061", "064", "082", "086",
            "089", "091", "093", "096", "097", "099", "062", "065", "084", "088",
            "081", "082", "085", "087", "090", "092", "095", "098", "061", "063",
            "080", "083", "086", "089", "091", "094", "097", "099", "062", "064",
            "084", "085", "088", "090", "093", "096", "098", "061", "065", "082",
            "081", "083", "087", "089", "092", "094", "095", "097", "063", "064",
            "080", "084", "086", "088", "091", "093", "096", "099", "062", "065",
            "082", "085", "088", "090", "094", "097", "061", "063", "080", "084",
            "081", "086", "089", "092", "095", "098", "062", "065", "083", "087",
            "080", "082", "084", "086", "088", "091", "093", "096", "099", "061",
            "081", "083", "085", "087", "089", "090", "094", "097", "098", "062",
            "082", "084", "087", "089", "091", "093", "095", "096", "099", "063",
            "080", "083", "085", "088", "090", "092", "094", "097", "098", "064",
            "081", "084", "086", "089", "091", "093", "095", "097", "099", "065",
            "080", "082", "085", "087", "088", "090", "092", "094", "096", "061",
            "081", "083", "086", "088", "089", "091", "093", "095", "097", "062",
            "082", "084", "085", "087", "090", "092", "094", "096", "098", "063"
        ];

        // 🔥 2. อัปเดตชุดราคา (Amounts) ทั้งหมด 200 รายการตามในรูปภาพต้นฉบับเป๊ะ ๆ
        const amounts = [
            12500, 15900, 18900, 24500, 29900, 32000, 35900, 38500, 42000, 44900,
            11500, 16800, 21900, 27500, 43500,
            89, 150, 350, 590, 890, 1200, 1590, 2350, 3190, 4500,
            59, 250, 450, 690, 990, 1350, 1690, 2450, 3290, 4800,
            99, 190, 390, 750, 850, 1150, 1890, 2200, 3500, 5500,
            49, 290, 490, 650, 950, 1290, 1990, 2690, 3900, 4990,
            79, 120, 550, 790, 880, 1490, 1750, 2850, 3800, 5200,
            39, 180, 320, 580, 820, 1250, 1650, 2100, 3400, 6200,
            69, 220, 420, 680, 920, 1450, 1790, 2550, 3700, 7200,
            85, 260, 480, 720, 980, 1380, 1850, 2800, 3600, 8500,
            95, 300, 520, 850, 999, 1480, 1950, 2900, 3990, 9200,
            45, 110, 380, 520, 780, 1100, 1420, 2150, 3100, 4200,
            65, 160, 420, 630, 850, 1300, 1550, 2400, 3300, 5100,
            75, 195, 460, 710, 910, 1390, 1720, 2650, 3450, 5800,
            88, 230, 495, 760, 960, 1495, 1820, 2750, 3650, 6400,
            90, 280, 540, 810, 1050, 1580, 1820, 2890, 3820, 6900,
            35, 125, 310, 560, 840, 1180, 1610, 2250, 3250, 7400,
            55, 175, 440, 670, 890, 1240, 1680, 2380, 3350, 7990,
            72, 215, 470, 740, 930, 1360, 1750, 2590, 3550, 8200,
            82, 245, 515, 785, 975, 1440, 1880, 2790, 3750, 8800,
            92, 295, 565, 835, 1150, 1540, 1980, 2950, 3890, 9500
        ];

        function getRandomAmount() {
            const randomPrice = amounts[Math.floor(Math.random() * amounts.length)];
            return randomPrice.toLocaleString('th-TH') + " ฿";
        }

        function createRandomOrder(timeText) {
            const randomPrefix = prefixes[Math.floor(Math.random() * prefixes.length)]; 
            const midDigit = Math.floor(Math.random() * 10); 
            const last4 = Math.floor(1000 + Math.random() * 9000); 
            
            const userStr = "คุณลูกค้า: " + randomPrefix + "-" + midDigit + "X-" + last4;
            const amountStr = getRandomAmount();

            return '<div class="order-item">' +
                    '<div class="item-left">' +
                        '<div class="item-icon">🛍️</div>' +
                        '<div class="item-info">' +
                            '<div class="item-user">' + userStr + '</div>' +
                            '<div class="item-time">' + timeText + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="item-right">' +
                        '<div class="item-amount">' + amountStr + '</div>' +
                        '<div class="item-status">✓ จ่ายแล้ว</div>' +
                    '</div>' +
                '</div>';
        }

        const orderList = document.getElementById('orderList');

        // เซ็ตอัปรายการเริ่มต้นตอนโหลดหน้าแรกให้สมจริง
        orderList.innerHTML = 
            createRandomOrder("เมื่อสักครู่นี้") +
            createRandomOrder("1 นาทีที่แล้ว") +
            createRandomOrder("2 นาทีที่แล้ว") +
            createRandomOrder("4 นาทีที่แล้ว");

        // ⏱️ ระบบลูปสุ่มเกิดออเดอร์ใหม่: ปรับเวลาหน่วงให้อยู่ในช่วง 30 วินาที ถึง 1 นาทีครึ่ง (30,000 - 90,000 มิลลิวินาที)
        function startOrderLoop() {
            const minTime = 30000; // 30 วินาที
            const maxTime = 90000; // 1 นาทีครึ่ง (90 วินาที)
            const randomTime = Math.floor(Math.random() * (maxTime - minTime + 1)) + minTime; 

            setTimeout(() => {
                const newOrder = createRandomOrder("เมื่อสักครู่นี้");
                orderList.insertAdjacentHTML('afterbegin', newOrder);
                
                if (orderList.children.length > 4) {
                    orderList.removeChild(orderList.lastChild);
                }
                
                // ค่อยๆ ขยับสเต็ปเวลาของรายการเก่าลงไปตามความเหมาะสม
                if(orderList.children[1]) orderList.children[1].querySelector('.item-time').innerText = "1 นาทีที่แล้ว";
                if(orderList.children[2]) orderList.children[2].querySelector('.item-time').innerText = "2 นาทีที่แล้ว";
                if(orderList.children[3]) orderList.children[3].querySelector('.item-time').innerText = "4 นาทีที่แล้ว";
                
                startOrderLoop(); // รันลูปต่อไป
            }, randomTime);
        }
        startOrderLoop();
    </script>

</body>
</html>
