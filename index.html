<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Solution Co.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        /* บีบเนื้อหาให้เป็นทรงแนวตั้งแคบๆ ตรงกลางจอ PC โดยไม่มีกรอบมาบัง */
        .container {
            text-align: center;
            max-width: 430px; /* ความกว้างทรงมือถือ */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo {
            width: 100%;
            max-width: 240px; /* ขนาดโลโก้ */
            height: auto;
            margin-bottom: 15px;
            display: block;
        }
        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin-bottom: 35px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        /* ปรับให้ปุ่มเรียงซ้อนกันเป็นแนวตั้งลงมาตรงกลาง */
        .btn-container {
            display: flex;
            flex-direction: column; /* สั่งให้ปุ่มเรียงลงมาข้างล่าง */
            align-items: center;
            gap: 20px; /* ระยะห่างระหว่างปุ่มบนกับปุ่มล่าง */
            width: 100%;
        }
        .btn-img {
            width: 100%;
            max-width: 240px; /* ขนาดความกว้างของปุ่ม */
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <h1>Landing Page</h1>
        
        <div class="btn-container">
            <a href="#"><img src="button1.png" alt="สมัครสมาชิก" class="btn-img"></a>
            <a href="#"><img src="button2.png" alt="ติดต่อสอบถาม" class="btn-img"></a>
        </div>
    </div>

</body>
</html>
