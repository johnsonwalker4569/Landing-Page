<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF CLUB - Official</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px); 
            z-index: -1;
            transform: scale(1.1); 
        }

        .container {
            text-align: center;
            max-width: 400px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 100%;
            max-width: 260px; 
            height: auto;
            margin-bottom: 20px; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .rating-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .rating-stars {
            color: #ffcc00;
            margin-right: 5px;
        }

        .trust-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 340px;
            gap: 8px;
            margin-bottom: 25px;
        }
        .trust-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 2px;
            color: #fff;
            font-size: 11px;
            font-weight: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .trust-icon {
            font-size: 18px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-img {
            width: 100%;
            max-width: 280px; 
            height: auto;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
        }
        .btn-img:hover {
            transform: translateY(-3px) scale(1.03);
            filter: brightness(1.1);
        }

        /* รูปที่พี่ทำเอง */
        .banner-container {
            width: 100%;
            max-width: 340px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .social-proof-panel {
            width: 100%;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 16px 14px;
            margin-bottom: 25px;
            color: #fff;
            text-align: left;
        }
        .proof-title {
            font-size: 13px;
            color: #ffcc00;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 12px;
        }
        .stat-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 8px;
            border-radius: 10px;
        }
        .stat-num {
            font-size: 18px;
            font-weight: 600;
            color: #2ea34a;
        }
        .stat-label {
            font-size: 11px;
            color: #a1a1aa;
        }
        .review-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 75px;
        }
        .review-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 11.5px;
            border-left: 3px solid #ffcc00;
            animation: fadeInDown 0.5s ease-out; 
        }
        .review-user {
            font-weight: 400;
            color: #f4f4f5;
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .review-text {
            color: #d4d4d8;
            line-height: 1.4;
        }

        .slider-wrapper {
            width: 100%;
            max-width: 340px; 
            position: relative;
            overflow: hidden;
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 25px; 
        }
        .slider {
            display: flex;
            width: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .slider img {
            width: 100%;
            height: auto;
            display: block;
            flex-shrink: 0;
        }

            width: 100%;
            max-width: 360px; 
            background: rgba(24, 24, 28, 0.95); 
            border: 1px solid rgba(25
