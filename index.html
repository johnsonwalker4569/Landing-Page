<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Solution Co.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        /* แยกฉากหลังออกมาทำความมัว (Blur) เพื่อไม่ให้โลโก้และปุ่มมัวไปด้วย */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px); /* ค่าความมัวประมาณ 25% */
            z-index: -1;
            transform: scale(1.05); /* ขยายภาพจิ๊กเดียวเพื่อเก็บขอบไม่ให้เห็นเส้นขาวตอนเบลอ */
        }
        .container {
            text-align: center;
            max-width: 430px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo {
            width: 100%;
            max-width: 240px; 
            height: auto;
            margin-bottom: 30px; /* เพิ่มระยะห่างด้านล่างแทนคำที่ลบไป */
            display: block;
        }
        .btn-container {
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 20px; 
            width: 100%;
        }
        .btn-img {
            width: 100%;
            max-width: 240px; 
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <div class="btn-container">
            <a href="#"><img src="button1.png" alt="สมัครสมาชิก" class="btn-img"></a>
            <a href="#"><img src="button2.png" alt="ติดต่อสอบถาม" class="btn-img"></a>
        </div>
    </div>

</body>
</html>
