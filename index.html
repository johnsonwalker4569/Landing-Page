<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF CLUB 86 - Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px); 
            z-index: -1;
            transform: scale(1.1); 
        }

        .container {
            text-align: center;
            max-width: 400px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 100%;
            max-width: 300px; 
            height: auto;
            margin-bottom: 30px; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-bottom: 30px; 
        }

        .btn-img {
            width: 100%;
            max-width: 240px; 
            height: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-img:hover {
            transform: translateY(-3px) scale(1.03);
            filter: brightness(1.1);
        }

        /* โซนสไลด์ */
        .slider-wrapper {
            width: 100%;
            max-width: 320px; 
            position: relative;
            overflow: hidden;
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 30px; 
        }
        .slider {
            display: flex;
            width: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .slider img {
            width: 100%;
            height: auto;
            display: block;
            flex-shrink: 0;
        }

        /* กล่องยอดสั่งซื้อล่าสุด Realtime */
        .order-panel {
            width: 100%;
            max-width: 320px;
            background: rgba(20, 20, 20, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            color: #fff;
            text-align: left;
        }

        .order-header-wrapper {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .order-header {
            font-size: 16px;
            font-weight: bold;
            color: #ffcc00; 
            margin-bottom: 4px;
        }

        .live-clock {
            font-size: 12px;
            color: #aaa;
        }

        .order-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 350px;
            overflow: hidden; 
        }

        .order-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
            border-left: 4px solid #28a745;
            animation: fadeInDown 0.5s ease-in-out; 
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .item-icon {
            width: 35px;
            height: 35px;
            background: #28a745;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
        }

        .item-info {
            display: flex;
            flex-direction: column;
        }

        .item-user {
            font-size: 14px;
            font-weight: bold;
            color: #e0e0e0;
        }

        .item-time {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        .item-right {
            text-align: right;
        }

        .item-amount {
            font-size: 14px;
            font-weight: bold;
            color: #28a745; 
        }

        .item-status {
            font-size: 10px;
            color: #28a745;
            background: rgba(40, 167, 69, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <div class="btn-container">
            <a href="https://bfclubgame.com/?register=1&key=GOAT" target="_blank">
                <img src="button1.png" alt="สมัครสมาชิก" class="btn-img">
            </a>
            <a href="https://cutt.ly/UtU0uefS" target="_blank">
                <img src="button2.png" alt="ติดต่อสอบถาม" class="btn-img">
            </a>
        </div>

        <div class="slider-wrapper">
            <div class="slider" id="slider">
                <img src="slide1.png" alt="Slide 1">
                <img src="slide2.png" alt="Slide 2">
                <img src="slide3.png" alt="Slide 3">
                <img src="slide4.png" alt="Slide 4">
                <img src="slide5.png" alt="Slide 5">
            </div>
        </div>

        <div class="order-panel">
            <div class="order-header-wrapper">
                <div class="order-header">🛒 รายการสั่งซื้อล่าสุด</div>
                <div class="live-clock" id="liveClock">กำลังโหลดเวลา...</div>
            </div>
            
            <div class="order-list" id="orderList"></div>
        </div>

    </div>

    <script>
        // --- 1. โค้ดควบคุมสไลด์ภาพเลื่อนอัตโนมัติ ---
        const slider = document.getElementById('slider');
        let index = 0;
        const totalImages = 5; 
        setInterval(() => {
            index++;
            if (index >= totalImages) { index = 0; }
            slider.style.transform = `translateX(${-index * 100}%)`;
        }, 3000); 

        // --- 2. โค้ดนาฬิกา Realtime ---
        function updateClock() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('th-TH', options);
            const timeStr = now.toLocaleTimeString('th-TH');
            document.getElementById('liveClock').innerHTML = `${dateStr} ${timeStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 3. ระบบสุ่มเบอร์โทรศัพท์มั่วๆ ปิดท้าย 5 ตัวหลัง (ไม่มีชื่อแล้ว) ---
        const prefixes = ["080", "081", "082", "083", "084", "085", "086", "087", "088", "089", "090", "091", "092", "093", "094", "095", "096", "097", "098", "099", "061", "062", "063", "064", "065"];
        const times = ["เมื่อสักครู่นี้", "1 นาทีที่แล้ว", "2 นาทีที่แล้ว", "3 นาทีที่แล้ว", "4 นาทีที่แล้ว"];

        function getRandomAmount() {
            const amounts = [350, 590, 890, 1200, 1590, 2350, 3190, 4500, 5990, 7500, 9200, 12500, 18900];
            const randomPrice = amounts[Math.floor(Math.random() * amounts.length)];
            return randomPrice.toLocaleString('th-TH') + " ฿";
        }

        function createRandomOrder(timeText) {
            const pref = prefixes[Math.floor(Math.random() * prefixes.length)];
            // สุ่มเลขตัวที่ 4 (เช่น 081-5)
            const midDigit = Math.floor(Math.random() * 10); 
            // โครงสร้างปิดบังตัวเลข 5 ตัวหลังตามพี่สั่ง เป๊ะๆ
            const userStr = `เบอร์โทรศัพท์: ${pref}-${midDigit}x-xxxx`;
            
            const amountStr = getRandomAmount();
            const timeStr = timeText ? timeText : times[Math.floor(Math.random() * times.length)];

            return `
                <div class="order-item">
                    <div class="item-left">
                        <div class="item-icon">📦</div>
                        <div class="item-info">
                            <div class="item-user">${userStr}</div>
                            <div class="item-time">${timeStr}</div>
                        </div>
                    </div>
                    <div class="item-right">
                        <div class="item-amount">${amountStr}</div>
                        <div class="item-status">✓ ชำระเงินแล้ว</div>
                    </div>
                </div>
            `;
        }

        const orderList = document.getElementById('orderList');

        // สร้างรายการตั้งต้น
        orderList.innerHTML = 
            createRandomOrder("เมื่อสักครู่นี้") +
            createRandomOrder("1 นาทีที่แล้ว") +
            createRandomOrder("3 นาทีที่แล้ว") +
            createRandomOrder("5 นาทีที่แล้ว");

        // ลูปสุ่มเด้งออเดอร์ใหม่เรื่อยๆ ทุกๆ 4-8 วินาที
        function startOrderLoop() {
            const randomTime = Math.floor(Math.random() * (8000 - 4000 + 1)) + 4000; 
            setTimeout(() => {
                const newOrder = createRandomOrder("เมื่อสักครู่นี้");
                
                orderList.insertAdjacentHTML('afterbegin', newOrder);
                if (orderList.children.length > 4) {
                    orderList.removeChild(orderList.lastChild);
                }

                if(orderList.children[1]) orderList.children[1].querySelector('.item-time').innerText = "1 นาทีที่แล้ว";
                if(orderList.children[2]) orderList.children[2].querySelector('.item-time').innerText = "2 นาทีที่แล้ว";
                if(orderList.children[3]) orderList.children[3].querySelector('.item-time').innerText = "4 นาทีที่แล้ว";

                startOrderLoop();
            }, randomTime);
        }
        startOrderLoop();
    </script>

</body>
</html>
