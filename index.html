<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Solution Co.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .logo {
            /* ควบคุมให้ไฟล์ขนาด 1024x1024 ย่อลงมาแสดงผลกว้างพอดีๆ บนหน้าจอ */
            width: 100%;
            max-width: 280px; 
            height: auto;
            margin-bottom: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .btn-img {
            max-width: 200px; 
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <div class="btn-container">
            <a href="#"><img src="button1.png" alt="สมัครสมาชิก" class="btn-img"></a>
            <a href="#"><img src="button2.png" alt="ติดต่อสอบถาม" class="btn-img"></a>
        </div>
    </div>

</body>
</html>
