<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF CLUB 86</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        /* พื้นหลังพร้อมความมัว 8% ของพี่ */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px); 
            z-index: -1;
            transform: scale(1.1); 
        }

        .container {
            text-align: center;
            max-width: 400px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ตรงนี้ปรับให้โลโก้ใหญ่เด่นขึ้นมาแล้วครับพี่ */
        .logo {
            width: 100%;
            max-width: 300px; /* เพิ่มความกว้างโลโก้ให้ใหญ่สะใจ */
            height: auto;
            margin-bottom: 30px; /* เพิ่มระยะห่างระหว่างโลโก้กับปุ่ม */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        /* ตรงนี้ปรับให้ปุ่มเล็กลงกว่าโลโก้เล็กน้อยเพื่อให้โลโก้เด่นครับ */
        .btn-img {
            width: 100%;
            max-width: 240px; /* บีบขนาดปุ่มลงมานิดหน่อย ไม่ให้แย่งซีนโลโก้ */
            height: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-img:hover {
            transform: translateY(-3px) scale(1.03);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <div class="btn-container">
            <a href="https://bfclubgame.com/?register=1&key=GOAT" target="_blank">
                <img src="button1.png" alt="สมัครสมาชิก" class="btn-img">
            </a>
            <a href="https://cutt.ly/UtU0uefS" target="_blank">
                <img src="button2.png" alt="ติดต่อสอบถาม" class="btn-img">
            </a>
        </div>
    </div>

</body>
</html>
