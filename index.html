<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Solution Co.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ใช้รูปพื้นหลังใหญ่เต็มจอ PC */
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        /* ส่วนที่บังคับให้เป็นรูปทรงมือถือตั้งอยู่ตรงกลางจอ PC */
        .mobile-wrapper {
            width: 100%;
            max-width: 390px; /* ขนาดความกว้างเท่าจอมือถือทั่วไป */
            min-height: 80vh;
            background: rgba(0, 0, 0, 0.4); /* ฉากหลังโปร่งแสงในจอมือถือเพื่อให้เห็นปุ่มชัดขึ้น */
            backdrop-filter: blur(10px); /* ทำฉากหลังเบลอนิดๆ ให้ดูหรูหรา */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; /* ทำมุมโค้งมนเหมือนขอบมือถือ */
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); /* ใส่เงาให้ดูมีมิติ */
        }
        .logo {
            width: 100%;
            max-width: 220px; /* ขนาดโลโก้ในจอมือถือ */
            height: auto;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            color: #ffffff;
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .btn-container {
            display: flex;
            flex-direction: column; /* เปลี่ยนเป็นเรียงปุ่มขึ้นลงแนวตั้งแบบมือถือ */
            align-items: center;
            gap: 20px;
            width: 100%;
        }
        .btn-img {
            width: 100%;
            max-width: 240px; /* ขนาดปุ่มกด */
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        
        <img src="logo.png" alt="Logo" class="logo">
        
        <h1>Landing Page</h1>
        
        <div class="btn-container">
            <a href="#"><img src="button1.png" alt="สมัครสมาชิก" class="btn-img"></a>
            <a href="#"><img src="button2.png" alt="ติดต่อสอบถาม" class="btn-img"></a>
        </div>
        
    </div>

</body>
</html>
