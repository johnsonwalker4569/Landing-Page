<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url('bg.jpg');
            background-position: center top;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-top: 100px;
        }
        .btn-link {
            transition: transform 0.2s;
            cursor: pointer;
        }
        .btn-link:hover {
            transform: scale(1.05);
        }
        .btn-link img {
            display: block;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="#" target="_blank" class="btn-link">
            <img src="button1.png" alt="เข้าสู่เว็บไซต์">
        </a>

        <a href="#" target="_blank" class="btn-link">
            <img src="button2.png" alt="ติดต่อเรา">
        </a>
    </div>

</body>
</html>
